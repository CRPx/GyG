<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Pendientes GyG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header-subtitle {
            color: #666;
            font-size: 14px;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .form-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-title::before {
            content: '➕';
            font-size: 24px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input, select, textarea {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        button {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .filters-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-label {
            font-weight: 600;
            color: #333;
        }

        .filter-select {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .task-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border-left: 6px solid;
        }

        .task-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 48px rgba(0,0,0,0.15);
        }

        .task-header {
            padding: 16px;
            color: white;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-date {
            font-size: 12px;
            opacity: 0.9;
        }

        .task-body {
            padding: 16px;
        }

        .task-field {
            margin-bottom: 12px;
        }

        .task-field-label {
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .task-field-value {
            font-size: 14px;
            color: #333;
            margin-top: 4px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .status-pendiente {
            background: #ffe5e5;
            color: #d32f2f;
            border-left-color: #d32f2f;
        }

        .status-en-proceso {
            background: #fff3e0;
            color: #f57c00;
            border-left-color: #f57c00;
        }

        .status-completado {
            background: #e8f5e9;
            color: #388e3c;
            border-left-color: #388e3c;
        }

        .task-header.header-pendiente {
            background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%);
        }

        .task-header.header-en-proceso {
            background: linear-gradient(135deg, #f57c00 0%, #e65100 100%);
        }

        .task-header.header-completado {
            background: linear-gradient(135deg, #388e3c 0%, #1b5e20 100%);
        }

        .task-actions {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid #e0e0e0;
            justify-content: flex-end;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: #667eea;
            color: white;
        }

        .btn-edit:hover {
            background: #5568d3;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
        }

        .btn-delete:hover {
            background: #ee5a52;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state-text {
            font-size: 16px;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            font-weight: 600;
        }

        .stat-total { color: #667eea; }
        .stat-pendiente { color: #d32f2f; }
        .stat-en-proceso { color: #f57c00; }
        .stat-completado { color: #388e3c; }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.3);
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }

        .close {
            color: #999;
            float: right;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #333;
        }

        .no-tasks {
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .tasks-grid {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .filters-container {
                flex-direction: column;
                align-items: flex-start;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 Gestor de Pendientes GyG</h1>
            <p class="header-subtitle">Organización y monitoreo de pendientes de los clientes</p>
        </header>

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-number stat-total" id="totalCount">0</div>
                <div class="stat-label">Total de Pendientes</div>
            </div>
            <div class="stat-card">
                <div class="stat-number stat-pendiente" id="pendienteCount">0</div>
                <div class="stat-label">Pendientes</div>
            </div>
            <div class="stat-card">
                <div class="stat-number stat-en-proceso" id="enProcesoCount">0</div>
                <div class="stat-label">En Proceso</div>
            </div>
            <div class="stat-card">
                <div class="stat-number stat-completado" id="completadoCount">0</div>
                <div class="stat-label">Completados</div>
            </div>
        </div>

        <div class="form-container">
            <div class="form-title">Agregar Nuevo Pendiente</div>
            <form id="taskForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="date">📅 Fecha</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="empresa">🏢 Nombre de la Empresa</label>
                        <input type="text" id="empresa" placeholder="Ej: Empresa ABC S.A." required>
                    </div>
                    <div class="form-group">
                        <label for="pendientes">📋 Detalles del Trabajo</label>
                        <textarea id="pendientes" placeholder="Describe los pendientes o detalles del trabajo a realizar..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="observaciones">📝 Observaciones</label>
                        <textarea id="observaciones" placeholder="Notas adicionales, restricciones, horarios, etc."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="estatus">✓ Estatus</label>
                        <select id="estatus" required>
                            <option value="Pendiente">🔴 Pendiente</option>
                            <option value="En proceso">🟠 En proceso</option>
                            <option value="Completado">🟢 Completado</option>
                        </select>
                    </div>
                </div>
                <div class="form-buttons">
                    <button type="reset" class="btn-secondary">Limpiar</button>
                    <button type="submit" class="btn-primary">Guardar Pendiente</button>
                </div>
            </form>
        </div>

        <div class="filters-container">
            <span class="filter-label">🔍 Filtrar por:</span>
            <select id="filterEmpresa" class="filter-select">
                <option value="">Todas las Empresas</option>
            </select>
            <select id="filterEstatus" class="filter-select">
                <option value="">Todos los Estatus</option>
                <option value="Pendiente">Pendiente</option>
                <option value="En proceso">En proceso</option>
                <option value="Completado">Completado</option>
            </select>
            <button class="btn-secondary" onclick="exportData()">📥 Exportar a Excel</button>
        </div>

        <div class="tasks-grid" id="tasksGrid">
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-header">Editar Pendiente</div>
            <form id="editForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="editDate">Fecha</label>
                        <input type="date" id="editDate" required>
                    </div>
                    <div class="form-group">
                        <label for="editEmpresa">Empresa</label>
                        <input type="text" id="editEmpresa" required>
                    </div>
                    <div class="form-group">
                        <label for="editPendientes">Detalles</label>
                        <textarea id="editPendientes" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="editObservaciones">Observaciones</label>
                        <textarea id="editObservaciones"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="editEstatus">Estatus</label>
                        <select id="editEstatus" required>
                            <option value="Pendiente">Pendiente</option>
                            <option value="En proceso">En proceso</option>
                            <option value="Completado">Completado</option>
                        </select>
                    </div>
                </div>
                <div class="form-buttons">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
