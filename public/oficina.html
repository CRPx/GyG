<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pendientes GyG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styleOficina.css">
</head>
<body data-page="oficina">

  <header class="page-header">
    <div class="header-inner">
      <img src="logo.png" alt="Logo GyG" class="header-logo">
      <div class="header-text">
        <h1>PENDIENTES GyG</h1>
        <p class="header-subtitle">Organización y monitoreo de pendientes</p>
      </div>
      <a href="empresas.html" class="header-nav-btn" style="margin-left:auto; padding:8px 16px; background:rgba(255,255,255,0.12); color:#fff; border:1px solid rgba(255,255,255,0.25); border-radius:8px; font-size:13px; font-weight:700; text-decoration:none; white-space:nowrap; font-family:inherit;">
        Ir a Empresas →
      </a>
    </div>
  </header>

  <main class="page-layout">

    <!-- ── Left panel: stats + filters + task list ── -->
    <section class="left-panel">
      <div class="left-panel-inner">
        <!-- Botón de cambio de vista -->
        <div style="display: flex; justify-content: center; margin-bottom: 8px;">
          <button id="toggleViewBtn" class="btn-secondary" style="min-width: 200px;">
            📋 Cambiar a vista lista
          </button>
        </div>
        <!-- Resumen por responsable (desplegable) -->
        <div id="stats-table-container" class="collapsible-section collapsed">
          <div class="section-header" data-target="statsContent">
            <h3>📊 Resumen</h3>
            <span class="toggle-icon">▼</span>
          </div>
          <div id="statsContent" class="collapsible-content">
            <table id="statsTable" class="stats-table">
              <thead>
                <tr>
                  <th>Responsable</th>
                  <th>Total</th>
                  <th>Pendiente</th>
                  <th>En proceso</th>
                  <th>Completado</th>
                </tr>
              </thead>
              <tbody id="statsTableBody"></tbody>
            </table>
          </div>
        </div>

        <!-- Filtros (desplegable) -->
        <div class="filters-container collapsible-section collapsed">
          <div class="section-header" data-target="filtersContent">
            <span class="filter-label">🔍 Filtrar por</span>
            <span class="toggle-icon">▼</span>
          </div>
          <div id="filtersContent" class="collapsible-content">
            <div class="filters-row filters-row-selects">
              <input type="date" id="filterFecha" class="filter-select">
              <select id="filterResponsable" class="filter-select">
                <option value="">Responsable</option>
              </select>
              <select id="filterEstatus" class="filter-select">
                <option value="">Estatus</option>
                <option value="Pendiente">Pendiente</option>
                <option value="En proceso">En proceso</option>
                <option value="Completado">Completado</option>
              </select>
            </div>
            <div class="filters-row filters-row-actions">
              <button class="btn-secondary" onclick="clearFilters()">Limpiar</button>
              <button class="btn-secondary" onclick="exportData()">Exportar Excel</button>
            </div>
          </div>
        </div>

        <!-- Tarjetas de pendientes -->
        <div class="tasks-grid" id="tasksGrid"></div>

      </div>
    </section>

    <!-- ── Right panel: form (sticky sidebar) ── -->
    <aside class="right-panel">
      <div class="mobile-form-close" id="mobileFormClose">
      </div>
      <div class="form-container">
        <div class="form-title">Nuevo Pendiente</div>

        <!-- Bloque IA -->
        <div style="background:#f0f4ff;border:1px solid #c7d4f0;border-radius:10px;padding:14px 16px;margin-bottom:16px;">
          <label style="font-weight:600;font-size:0.9rem;display:block;margin-bottom:8px;">✨ Crear con IA</label>
          <div style="display:flex;gap:8px;align-items:flex-start;">
            <div class="voice-field" style="flex:1;">
              <textarea id="iaTexto" rows="2" placeholder='Ej: "Visita a empresa GYG el lunes, entregar cotización"'></textarea>
              <button type="button" class="mic-btn" id="mic-iaTexto" title="Dictar texto por voz">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>
                </svg>
              </button>
            </div>
            <button type="button" id="iaBtnOficina" onclick="iaLlenarFormulario('oficina')"
              style="background:#4f6ef7;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-weight:600;cursor:pointer;white-space:nowrap;font-size:0.85rem;">
              ✨ Generar
            </button>
          </div>
          <p id="iaStatus" style="font-size:0.8rem;color:#666;margin-top:6px;display:none;"></p>
        </div>

        <form id="taskForm">
          <div class="form-grid">

            <div class="form-group">
              <label for="date">Fecha</label>
              <input type="date" id="date" required>
            </div>

            <div class="form-group">
              <label for="empresa">Título</label>
              <input type="text" id="empresa" placeholder="Ej. Visita a empresa" required>
            </div>

            <div class="form-group form-group-full">
              <label for="pendientes">Detalles del pendiente</label>
              <div class="voice-field">
                <textarea id="pendientes" placeholder="Describe los pendientes..." required></textarea>
                <button type="button" class="mic-btn" id="mic-pendientes" title="Dictar texto por voz">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="form-group form-group-full">
              <label for="observaciones">Observaciones</label>
              <div class="voice-field">
                <textarea id="observaciones" placeholder="Notas adicionales..."></textarea>
                <button type="button" class="mic-btn" id="mic-observaciones" title="Dictar texto por voz">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label for="estatus">Estatus</label>
              <select id="estatus" required>
                <option value="Pendiente">Pendiente</option>
                <option value="En proceso">En proceso</option>
                <option value="Completado">Completado</option>
              </select>
            </div>

            <div class="form-group">
              <label for="responsable">Responsable</label>
              <select id="responsable" required>
                <option value="">Selecciona un responsable</option>
              </select>
            </div>

          </div>

          <div class="form-buttons">
            <button type="reset" class="btn-secondary">Limpiar</button>
            <button type="submit" class="btn-primary">Guardar Pendiente</button>
          </div>
        </form>
      </div>
    </aside>

  </main>

  <!-- ── Edit Modal ── -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <div class="modal-header">Editar Pendiente</div>

      <form id="editForm">
        <div class="form-grid">

          <div class="form-group">
            <label for="editDate">Fecha</label>
            <input type="date" id="editDate" required>
          </div>

          <div class="form-group">
            <label for="editEmpresa">Empresa</label>
            <input type="text" id="editEmpresa" required>
          </div>

          <div class="form-group form-group-full">
            <label for="editPendientes">Detalles</label>
            <div class="voice-field">
              <textarea id="editPendientes" required></textarea>
              <button type="button" class="mic-btn" id="mic-editPendientes" title="Dictar texto por voz">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group form-group-full">
            <label for="editObservaciones">Observaciones</label>
            <div class="voice-field">
              <textarea id="editObservaciones"></textarea>
              <button type="button" class="mic-btn" id="mic-editObservaciones" title="Dictar texto por voz">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="editEstatus">Estatus</label>
            <select id="editEstatus" required>
              <option value="Pendiente">Pendiente</option>
              <option value="En proceso">En proceso</option>
              <option value="Completado">Completado</option>
            </select>
          </div>

          <div class="form-group">
            <label for="editResponsable">Responsable</label>
            <select id="editResponsable">
              <option value="">Selecciona un responsable</option>
            </select>
          </div>

        </div>

        <div class="form-buttons">
          <button type="button" class="btn-secondary" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn-primary">Guardar Cambios</button>
        </div>
      </form>
    </div>
  </div>

  <button class="fab-new" id="fabNew" aria-label="Nuevo Pendiente">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Nuevo
  </button>

  <script defer src="auth.js"></script>
  <script defer src="app.js"></script>
</body>
</html>
