<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repositorio GyG</title>
  <link rel="stylesheet" href="/styleOficina.css">
  <style>
    /* Estilos adicionales específicos del repositorio */
    .repositorio-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .repositorio-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .breadcrumbs {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--tx-muted);
    }
    .breadcrumbs a {
      color: var(--navy);
      text-decoration: none;
      font-weight: 600;
    }
    .breadcrumbs a:hover { text-decoration: underline; }
    .acciones {
      display: flex;
      gap: 12px;
    }
    .search-box {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .search-box input {
      min-width: 260px;
    }
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }
    .item-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: pointer;
      transition: border-radius 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: var(--sh-card);
    }
    .item-card:hover {
      box-shadow: var(--sh-lift);
      transform: translateY(-2px);
    }
    .item-icon {
      font-size: 48px;
      margin-bottom: 8px;
    }
    .item-nombre {
      font-weight: 600;
      word-break: break-word;
      margin-bottom: 4px;
    }
    .item-meta {
      font-size: 12px;
      color: var(--tx-muted);
    }

    .shadow {
    box-shadow: inset 0 -3em 3em rgba(0,0,0,0.1),
                0 0  0 2px rgb(190, 190, 190),
                0.3em 0.3em 1em rgba(0,0,0,0.3);
    }

    .empty-repo {
      text-align: center;
      padding: 60px;
      color: var(--tx-muted);
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--r-md);
      padding: 32px;
      text-align: center;
      margin-bottom: 20px;
      transition: var(--ease);
      cursor: pointer;
    }
    .upload-area:hover {
      border-color: var(--navy);
      background: var(--navy-light);
    }
    .upload-area input {
      display: none;
    }
  </style>
</head>
<body data-page="oficina">
  <header class="page-header">
    <div class="header-inner">
      <img src="logo.png" alt="Logo GyG" class="header-logo">
      <div class="header-text">
        <h1>REPOSITORIO GyG</h1>
        <p class="header-subtitle">Almacenamiento de archivos</p>
      </div>
      <a href="panel.html" class="header-nav-btn" style="margin-left:auto; padding:8px 16px; background:rgba(255,255,255,0.12); color:#fff; border:1px solid rgba(255,255,255,0.25); border-radius:8px; font-size:13px; font-weight:700; text-decoration:none;">
        ← Panel
      </a>
    </div>
  </header>

  <main class="repositorio-container">
    <div class="repositorio-header">
      <div class="breadcrumbs" id="breadcrumbs"></div>
      <div class="acciones">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Buscar archivos o carpetas..." class="filter-select" style="min-width:260px;">
          <button class="btn-secondary" id="searchBtn">🔍 Buscar</button>
        </div>
        <button class="btn-primary" id="nuevaCarpetaBtn">📁 Nueva carpeta</button>
        <button class="btn-primary" id="subirArchivoBtn">📤 Subir archivo</button>
      </div>
    </div>

    <div id="itemsContainer" class="items-grid"></div>
  </main>

  <!-- Modal para crear carpeta -->
  <div id="carpetaModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeCarpetaModal()">&times;</span>
      <div class="modal-header">Nueva carpeta</div>
      <div class="form-group">
        <label for="nombreCarpeta">Nombre de la carpeta</label>
        <input type="text" id="nombreCarpeta" placeholder="Ej. Documentos">
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeCarpetaModal()">Cancelar</button>
        <button class="btn-primary" id="crearCarpetaBtn">Crear</button>
      </div>
    </div>
  </div>

  <!-- Modal para subir archivo -->
  <div id="uploadModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeUploadModal()">&times;</span>
      <div class="modal-header">Subir archivo</div>
      <div class="upload-area" id="dropArea">
        <div>📁 Arrastra un archivo aquí o haz clic para seleccionar</div>
        <input type="file" id="fileInput">
      </div>
      <div id="uploadStatus" style="margin: 12px 0;"></div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeUploadModal()">Cancelar</button>
        <button class="btn-primary" id="uploadBtn" disabled>Subir</button>
      </div>
    </div>
  </div>

  <script defer src="auth.js"></script>
  <script>
    // Estado
    let carpetaActual = null; // null = raíz
    let breadcrumbs = [];

    const itemsContainer = document.getElementById('itemsContainer');
    const breadcrumbsDiv = document.getElementById('breadcrumbs');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');

    // Modales
    const carpetaModal = document.getElementById('carpetaModal');
    const uploadModal = document.getElementById('uploadModal');
    const nombreCarpetaInput = document.getElementById('nombreCarpeta');
    const fileInput = document.getElementById('fileInput');
    const dropArea = document.getElementById('dropArea');
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadStatus = document.getElementById('uploadStatus');
    let archivoSeleccionado = null;

    // Cargar contenido
    async function cargarContenido(carpetaId = null) {
    carpetaActual = carpetaId;
    const url = carpetaId ? `/api/repositorio?carpetaId=${carpetaId}` : '/api/repositorio';
    try {
        const res = await fetch(url, { credentials: 'include' });
        if (!res.ok) throw new Error('Error al cargar');
        const items = await res.json();
        renderItems(items);
        cargarBreadcrumbs(carpetaId);
    } catch (e) {
        alert('Error al cargar el repositorio');
    }
    }

    async function cargarBreadcrumbs(carpetaId) {
    if (!carpetaId) {
        breadcrumbs = [];
        renderBreadcrumbs();
        return;
    }
    const res = await fetch(`/api/repositorio/ruta/${carpetaId}`, { credentials: 'include' });
    breadcrumbs = await res.json();
    renderBreadcrumbs();
    }

    function renderBreadcrumbs() {
    let html = `<a href="#" data-id="">🏠 Raíz</a>`;
    breadcrumbs.forEach((c) => {
        html += ` <span>›</span> <a href="#" data-id="${c.id}">${escapeHtml(c.nombre)}</a>`;
    });
    breadcrumbsDiv.innerHTML = html;
    document.querySelectorAll('.breadcrumbs a').forEach(link => {
        link.addEventListener('click', (e) => {
        e.preventDefault();
        const id = link.dataset.id;
        cargarContenido(id ? parseInt(id) : null);
        });
    });
    }

    function renderItems(items) {
    if (items.length === 0) {
        itemsContainer.innerHTML = `<div class="empty-repo">📭 Esta carpeta está vacía</div>`;
        return;
    }
    itemsContainer.innerHTML = items.map(item => {
        const icon = item.tipo === 'carpeta' ? '📁' : '📄';
        const size = item.tamano ? formatBytes(item.tamano) : '';
        const displayName = item.tipo === 'archivo' ? (item.nombre_original || item.nombre) : item.nombre;
        return `
        <div class="item-card shadow" data-id="${item.id}" data-tipo="${item.tipo}">
            <div class="item-icon">${icon}</div>
            <div class="item-nombre">${escapeHtml(displayName)}</div>
            <div class="item-meta">${size}</div>
        </div>
        `;
    }).join('');

    document.querySelectorAll('.item-card').forEach(card => {
        card.addEventListener('click', () => {
        const id = card.dataset.id;
        const tipo = card.dataset.tipo;
        if (tipo === 'carpeta') {
            cargarContenido(parseInt(id));
        } else {
            window.location.href = `/api/repositorio/descargar/${id}`;
        }
        });
        card.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        const id = card.dataset.id;
        const tipo = card.dataset.tipo;
        if (confirm(`¿Eliminar ${tipo}?`)) {
            eliminarItem(id, tipo);
        }
        });
    });
    }

    async function eliminarItem(id, tipo) {
    const endpoint = tipo === 'carpeta' ? `/api/repositorio/carpetas/${id}` : `/api/repositorio/archivos/${id}`;
    const res = await fetch(endpoint, { method: 'DELETE', credentials: 'include' });
    if (res.ok) {
        cargarContenido(carpetaActual);
    } else {
        alert('Error al eliminar');
    }
    }

    function formatBytes(bytes, decimals = 2) {
    if (bytes === 0) return '0 Bytes';
    const k = 1024;
    const dm = decimals < 0 ? 0 : decimals;
    const sizes = ['Bytes', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    function escapeHtml(text) {
    if (!text) return '';
    return String(text).replace(/[&<>"]/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
    }

    // Búsqueda
    async function buscar(termino) {
    if (!termino) {
        cargarContenido(carpetaActual);
        return;
    }
    const res = await fetch(`/api/repositorio/buscar?q=${encodeURIComponent(termino)}`, { credentials: 'include' });
    const data = await res.json();
    // La búsqueda devuelve { carpetas: [...], archivos: [...] }
    const items = [...(data.carpetas || []), ...(data.archivos || [])];
    renderItems(items);
    breadcrumbsDiv.innerHTML = `<a href="#" id="clearSearch">← Volver</a>`;
    document.getElementById('clearSearch').addEventListener('click', (e) => {
        e.preventDefault();
        searchInput.value = '';
        cargarContenido(carpetaActual);
    });
    }

    searchBtn.addEventListener('click', () => buscar(searchInput.value));
    searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') buscar(searchInput.value); });

    // Modal carpeta
    document.getElementById('nuevaCarpetaBtn').addEventListener('click', () => {
    nombreCarpetaInput.value = '';
    carpetaModal.style.display = 'block';
    });
    window.closeCarpetaModal = () => carpetaModal.style.display = 'none';
    document.getElementById('crearCarpetaBtn').addEventListener('click', async () => {
    const nombre = nombreCarpetaInput.value.trim();
    if (!nombre) return alert('Nombre requerido');
    const res = await fetch('/api/repositorio/carpetas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ nombre, carpeta_padre_id: carpetaActual })
    });
    if (res.ok) {
        closeCarpetaModal();
        cargarContenido(carpetaActual);
    } else {
        alert('Error al crear carpeta');
    }
    });

    // Modal upload
    document.getElementById('subirArchivoBtn').addEventListener('click', () => {
    archivoSeleccionado = null;
    uploadBtn.disabled = true;
    uploadStatus.textContent = '';
    uploadModal.style.display = 'block';
    });
    window.closeUploadModal = () => uploadModal.style.display = 'none';

    dropArea.addEventListener('click', () => fileInput.click());
    dropArea.addEventListener('dragover', (e) => { e.preventDefault(); dropArea.style.background = 'var(--navy-light)'; });
    dropArea.addEventListener('dragleave', () => { dropArea.style.background = ''; });
    dropArea.addEventListener('drop', (e) => {
    e.preventDefault();
    dropArea.style.background = '';
    const files = e.dataTransfer.files;
    if (files.length) {
        archivoSeleccionado = files[0];
        uploadStatus.textContent = `Archivo: ${archivoSeleccionado.name} (${formatBytes(archivoSeleccionado.size)})`;
        uploadBtn.disabled = false;
    }
    });
    fileInput.addEventListener('change', () => {
    if (fileInput.files.length) {
        archivoSeleccionado = fileInput.files[0];
        uploadStatus.textContent = `Archivo: ${archivoSeleccionado.name} (${formatBytes(archivoSeleccionado.size)})`;
        uploadBtn.disabled = false;
    }
    });

    uploadBtn.addEventListener('click', async () => {
    if (!archivoSeleccionado) return;
    const formData = new FormData();
    formData.append('archivo', archivoSeleccionado);
    if (carpetaActual) formData.append('carpeta_id', carpetaActual);
    uploadBtn.disabled = true;
    uploadStatus.textContent = 'Subiendo...';
    const res = await fetch('/api/repositorio/archivos', {
        method: 'POST',
        credentials: 'include',
        body: formData
    });
    if (res.ok) {
        closeUploadModal();
        cargarContenido(carpetaActual);
    } else {
        uploadStatus.textContent = 'Error al subir archivo';
        uploadBtn.disabled = false;
    }
    });

    // Cerrar modales con click fuera
    window.addEventListener('click', (e) => {
    if (e.target === carpetaModal) closeCarpetaModal();
    if (e.target === uploadModal) closeUploadModal();
    });

    // Iniciar
    cargarContenido(null);
  </script>
</body>
</html>
